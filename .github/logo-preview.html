<!DOCTYPE html>
<html>
<head>
  <title>LLMKit - Animated Logo</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
      font-family: system-ui, sans-serif;
      background: #0a0a0f;
      color: #888;
    }
    .row { display: flex; gap: 60px; align-items: flex-start; }
    .label { text-align: center; margin-top: 12px; font-size: 13px; color: #555; }
    a { color: #67e8f9; }
  </style>
</head>
<body>
  <h2 style="color: #c084fc; margin-bottom: 0;">LLMKit Animated Logo</h2>
  <p style="color: #555; margin-top: 8px;">Light passes through K twice per cycle, slows to illuminate it</p>

  <div class="row">
    <!-- large version -->
    <div>
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
           viewBox="0 0 1024 1024" width="360" height="360">
        <defs>
          <radialGradient id="spot">
            <stop offset="0%" stop-color="white" stop-opacity="1"/>
            <stop offset="40%" stop-color="white" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </radialGradient>

          <filter id="brighten">
            <feComponentTransfer>
              <feFuncR type="linear" slope="1.8" intercept="0.05"/>
              <feFuncG type="linear" slope="2.2" intercept="0.08"/>
              <feFuncB type="linear" slope="2.0" intercept="0.06"/>
            </feComponentTransfer>
            <feGaussianBlur stdDeviation="2" result="soft"/>
            <feMerge>
              <feMergeNode in="soft"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <filter id="k-glow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feFlood flood-color="#2dd4bf" flood-opacity="0.15" result="teal"/>
            <feComposite in="teal" in2="blur" operator="in" result="glow"/>
            <feMerge>
              <feMergeNode in="glow"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!--
            Path: figure-8 through brain. Spotlight goes UP through K center,
            curves right into right hemisphere loop, crosses bottom below K,
            loops up through left hemisphere, curves back and DOWN through K.
            K gets two direct illumination passes per cycle.
            Dome stays at y=225 (not above brain outline).
          -->
          <path id="circuit" d="
            M 512 790
            L 512 640
            L 512 555
            L 512 440
            L 512 340
            L 512 265
            L 555 235
            L 610 225
            L 655 250
            L 690 290
            L 715 340
            L 730 395
            L 730 450
            L 710 500
            L 680 540
            L 645 565
            L 595 590
            L 512 605
            L 430 590
            L 380 565
            L 345 540
            L 315 500
            L 295 450
            L 295 395
            L 310 340
            L 335 290
            L 370 250
            L 415 225
            L 470 235
            L 512 265
            L 512 340
            L 512 440
            L 512 555
            L 512 640
            L 512 790
          " fill="none" stroke="none"/>

          <!--
            keyTimes: K segments get ~4x weight (slow dwell on K),
            hemisphere + dome get 1x (cruise), transitions get 1.5-2x.
            35 points, 34 segments.
          -->
          <mask id="glow-mask">
            <rect width="1024" height="1024" fill="black"/>
            <circle r="90" fill="url(#spot)">
              <animateMotion dur="24s" repeatCount="indefinite" calcMode="linear"
                keyTimes="0;0.018;0.055;0.127;0.200;0.273;0.300;0.318;0.336;0.355;0.373;0.391;0.409;0.427;0.445;0.464;0.482;0.500;0.518;0.536;0.555;0.573;0.591;0.609;0.627;0.645;0.664;0.682;0.700;0.727;0.800;0.873;0.945;0.982;1">
                <mpath xlink:href="#circuit"/>
              </animateMotion>
            </circle>
            <circle r="50" fill="url(#spot)" opacity="0.4">
              <animateMotion dur="24s" repeatCount="indefinite" begin="-0.8s" calcMode="linear"
                keyTimes="0;0.018;0.055;0.127;0.200;0.273;0.300;0.318;0.336;0.355;0.373;0.391;0.409;0.427;0.445;0.464;0.482;0.500;0.518;0.536;0.555;0.573;0.591;0.609;0.627;0.645;0.664;0.682;0.700;0.727;0.800;0.873;0.945;0.982;1">
                <mpath xlink:href="#circuit"/>
              </animateMotion>
            </circle>
          </mask>

          <mask id="k-mask">
            <rect x="400" y="250" width="240" height="340" fill="white"/>
          </mask>
        </defs>

        <image href="logo.png" x="0" y="0" width="1024" height="1024" opacity="0.55"/>

        <g mask="url(#glow-mask)">
          <image href="logo.png" x="0" y="0" width="1024" height="1024" filter="url(#brighten)"/>
        </g>

        <!-- K shimmer synced: peaks during both K passes (ascending ~t=0.05-0.27, descending ~t=0.73-0.95) -->
        <g mask="url(#k-mask)" filter="url(#k-glow)">
          <image href="logo.png" x="0" y="0" width="1024" height="1024">
            <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
              values="0;0;0.35;0.35;0;0;0.35;0.35;0"
              keyTimes="0;0.04;0.12;0.28;0.35;0.70;0.78;0.95;1"
              calcMode="linear"/>
          </image>
        </g>

      </svg>
      <div class="label">360px</div>
    </div>

    <!-- medium version -->
    <div>
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
           viewBox="0 0 1024 1024" width="180" height="180">
        <defs>
          <radialGradient id="spot2">
            <stop offset="0%" stop-color="white" stop-opacity="1"/>
            <stop offset="40%" stop-color="white" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </radialGradient>
          <filter id="brighten2">
            <feComponentTransfer>
              <feFuncR type="linear" slope="1.8" intercept="0.05"/>
              <feFuncG type="linear" slope="2.2" intercept="0.08"/>
              <feFuncB type="linear" slope="2.0" intercept="0.06"/>
            </feComponentTransfer>
            <feGaussianBlur stdDeviation="2" result="soft"/>
            <feMerge><feMergeNode in="soft"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <path id="circuit2" d="
            M 512 790 L 512 640 L 512 555 L 512 440 L 512 340 L 512 265
            L 555 235 L 610 225 L 655 250 L 690 290 L 715 340
            L 730 395 L 730 450 L 710 500 L 680 540 L 645 565
            L 595 590 L 512 605 L 430 590 L 380 565 L 345 540
            L 315 500 L 295 450 L 295 395 L 310 340 L 335 290
            L 370 250 L 415 225 L 470 235 L 512 265 L 512 340
            L 512 440 L 512 555 L 512 640 L 512 790
          " fill="none"/>
          <mask id="glow-mask2">
            <rect width="1024" height="1024" fill="black"/>
            <circle r="100" fill="url(#spot2)">
              <animateMotion dur="24s" repeatCount="indefinite" calcMode="linear"
                keyTimes="0;0.018;0.055;0.127;0.200;0.273;0.300;0.318;0.336;0.355;0.373;0.391;0.409;0.427;0.445;0.464;0.482;0.500;0.518;0.536;0.555;0.573;0.591;0.609;0.627;0.645;0.664;0.682;0.700;0.727;0.800;0.873;0.945;0.982;1">
                <mpath xlink:href="#circuit2"/>
              </animateMotion>
            </circle>
          </mask>
        </defs>
        <image href="logo.png" x="0" y="0" width="1024" height="1024" opacity="0.55"/>
        <g mask="url(#glow-mask2)">
          <image href="logo.png" x="0" y="0" width="1024" height="1024" filter="url(#brighten2)"/>
        </g>
      </svg>
      <div class="label">180px</div>
    </div>

    <!-- small version -->
    <div>
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
           viewBox="0 0 1024 1024" width="80" height="80">
        <defs>
          <radialGradient id="spot3">
            <stop offset="0%" stop-color="white" stop-opacity="1"/>
            <stop offset="50%" stop-color="white" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </radialGradient>
          <filter id="brighten3">
            <feComponentTransfer>
              <feFuncR type="linear" slope="2.0" intercept="0.08"/>
              <feFuncG type="linear" slope="2.5" intercept="0.1"/>
              <feFuncB type="linear" slope="2.2" intercept="0.08"/>
            </feComponentTransfer>
            <feGaussianBlur stdDeviation="3" result="soft"/>
            <feMerge><feMergeNode in="soft"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <path id="circuit3" d="
            M 512 790 L 512 640 L 512 555 L 512 440 L 512 340 L 512 265
            L 555 235 L 610 225 L 655 250 L 690 290 L 715 340
            L 730 395 L 730 450 L 710 500 L 680 540 L 645 565
            L 595 590 L 512 605 L 430 590 L 380 565 L 345 540
            L 315 500 L 295 450 L 295 395 L 310 340 L 335 290
            L 370 250 L 415 225 L 470 235 L 512 265 L 512 340
            L 512 440 L 512 555 L 512 640 L 512 790
          " fill="none"/>
          <mask id="glow-mask3">
            <rect width="1024" height="1024" fill="black"/>
            <circle r="120" fill="url(#spot3)">
              <animateMotion dur="24s" repeatCount="indefinite" calcMode="linear"
                keyTimes="0;0.018;0.055;0.127;0.200;0.273;0.300;0.318;0.336;0.355;0.373;0.391;0.409;0.427;0.445;0.464;0.482;0.500;0.518;0.536;0.555;0.573;0.591;0.609;0.627;0.645;0.664;0.682;0.700;0.727;0.800;0.873;0.945;0.982;1">
                <mpath xlink:href="#circuit3"/>
              </animateMotion>
            </circle>
          </mask>
        </defs>
        <image href="logo.png" x="0" y="0" width="1024" height="1024" opacity="0.55"/>
        <g mask="url(#glow-mask3)">
          <image href="logo.png" x="0" y="0" width="1024" height="1024" filter="url(#brighten3)"/>
        </g>
      </svg>
      <div class="label">80px</div>
    </div>
  </div>

  <p style="font-size: 12px; margin-top: 40px;">
    Toggle: <a href="#" onclick="document.body.style.background=document.body.style.background==='#ffffff'?'#0a0a0f':'#ffffff';return false">dark/light</a>
    &nbsp;|&nbsp; <a href="#" onclick="document.querySelectorAll('[id^=circuit]').forEach(p=>{let v=p.getAttribute('stroke')==='none'||!p.getAttribute('stroke');p.setAttribute('stroke',v?'#ff006680':'none');p.setAttribute('stroke-width',v?'3':'0')});return false">show/hide path</a>
    &nbsp;|&nbsp; Light goes straight through K (twice), loops through each hemisphere.
  </p>
</body>
</html>
