<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 115" fill="none">
  <defs>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* 12s cycle: 0-5s draw, 5-9.5s hold, 9.5-10.5s fade out, 10.5-12s blank */
    @keyframes d {
      0% { stroke-dashoffset: var(--l); opacity: 0; }
      2% { opacity: 1; }
      42% { stroke-dashoffset: 0; }
      79% { stroke-dashoffset: 0; opacity: 1; }
      88% { opacity: 0; }
      100% { stroke-dashoffset: var(--l); opacity: 0; }
    }
    @keyframes f {
      0% { opacity: 0; }
      42% { opacity: 1; }
      79% { opacity: 1; }
      88% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes p {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes breathe {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(192,132,252,0.25)) drop-shadow(0 0 10px rgba(34,211,238,0.06)); }
      50% { filter: drop-shadow(0 0 6px rgba(192,132,252,0.35)) drop-shadow(0 0 14px rgba(34,211,238,0.1)); }
    }
    svg { animation: breathe 4s ease-in-out infinite; }
    .s {
      fill: none; stroke: #c084fc; stroke-linecap: square; opacity: 0;
      stroke-dasharray: var(--l); stroke-dashoffset: var(--l);
      animation: d 12s ease-in-out infinite;
    }
    .n {
      fill: #22d3ee; opacity: 0;
      animation: f 12s ease-in-out infinite, p 3s ease-in-out infinite;
    }
  </style>

  <rect x="-5" y="0" width="300" height="115" rx="8" fill="#0a0a0a"/>

  <g filter="url(#neon)">
    <!-- L1 -->
    <path class="s" d="M15 15 L15 78" stroke-width="5.5" style="--l:63;animation-delay:0s"/>
    <path class="s" d="M15 78 L8 86" stroke-width="5.5" style="--l:11;animation-delay:0.7s"/>
    <path class="s" d="M15 78 L38 78" stroke-width="5.5" style="--l:23;animation-delay:0.7s"/>
    <circle class="n" cx="8" cy="86" r="1.8" style="animation-delay:0.9s,0.9s"/>

    <!-- L2 -->
    <path class="s" d="M38 15 L38 78" stroke-width="5.5" style="--l:63;animation-delay:0.2s"/>
    <path class="s" d="M38 78 L31 86" stroke-width="5.5" style="--l:11;animation-delay:0.9s"/>
    <path class="s" d="M38 78 L62 78" stroke-width="5.5" style="--l:24;animation-delay:0.9s"/>
    <circle class="n" cx="31" cy="86" r="1.8" style="animation-delay:1.1s,1.1s"/>

    <!-- M -->
    <path class="s" d="M72 82 L72 15 L92 48 L112 15 L112 82" stroke-width="5.5" stroke-linejoin="miter" style="--l:212;animation-delay:1.3s"/>
    <path class="s" d="M72 82 L66 90" stroke-width="5.5" style="--l:10;animation-delay:2.3s"/>
    <path class="s" d="M112 82 L118 90" stroke-width="5.5" style="--l:10;animation-delay:2.3s"/>
    <circle class="n" cx="66" cy="90" r="1.8" style="animation-delay:2.5s,2.5s"/>
    <circle class="n" cx="118" cy="90" r="1.8" style="animation-delay:2.5s,2.5s"/>

    <!-- K -->
    <path class="s" d="M140 8 L140 92" stroke-width="7.5" style="--l:84;animation-delay:2.6s"/>
    <path class="s" d="M140 50 L128 50" stroke-width="4" style="--l:12;animation-delay:3s"/>
    <circle class="n" cx="126" cy="50" r="2.8" style="animation-delay:3.2s,3.2s"/>
    <path class="s" d="M140 50 L182 5" stroke-width="7.5" style="--l:62;animation-delay:3.2s"/>
    <path class="s" d="M140 50 L185 95" stroke-width="7.5" style="--l:64;animation-delay:3.2s"/>

    <!-- it -->
    <g transform="rotate(-45, 210, 70)">
      <rect class="n" x="196" y="23.5" width="4" height="4" rx="1" style="animation-delay:4s,4s"/>
      <path class="s" d="M198 35 L198 70" stroke-width="4.5" style="--l:35;animation-delay:4.1s"/>
      <path class="s" d="M218 17 L218 70" stroke-width="4.5" style="--l:53;animation-delay:4.3s"/>
      <path class="s" d="M207 33 L229 33" stroke-width="4.5" style="--l:22;animation-delay:4.5s"/>
    </g>
  </g>
</svg>
