name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (e.g. shared, sdk, cli, mcp-server, ai-sdk-provider)'
        required: true
        type: choice
        options:
          - shared
          - sdk
          - cli
          - mcp-server
          - ai-sdk-provider

permissions:
  contents: read
  id-token: write # required for npm provenance (Sigstore OIDC)
  attestations: write # required for GitHub artifact attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm turbo build --filter=@f3d1/llmkit-${{ inputs.package }}

      - name: pack tarball
        run: cd packages/${{ inputs.package }} && pnpm pack --pack-destination /tmp/pkg

      - name: attest artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: /tmp/pkg/*.tgz

      - name: publish with provenance
        run: npm publish /tmp/pkg/*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="$TG_CHAT" \
            --data-urlencode "text=npm publish FAILED for ${{ inputs.package }}" > /dev/null
