name: Update Pricing

on:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: fetch latest pricing
        run: node scripts/fetch-pricing.mjs

      - name: build and verify
        run: |
          pnpm turbo build --filter=@f3d1/llmkit-shared --filter=@f3d1/llmkit-mcp-server
          node scripts/generate-pricing.mjs --check
          node test/contract-test.mjs
          node packages/proxy/test/xai-cost-test.mjs
          node packages/proxy/test/unit-test.mjs
          node packages/shared/test/exports-test.mjs

      - name: check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            MODELS=$(node -e "const p=require('./packages/shared/pricing.json');console.log(Object.values(p.providers).reduce((s,m)=>s+Object.keys(m).length,0))")
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "models=$MODELS" >> $GITHUB_OUTPUT
          fi

      - name: create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="pricing-update-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add packages/shared/pricing.json packages/shared/src/pricing-data.ts packages/python-sdk/src/llmkit/_pricing_data.py packages/mcp-server/src/pricing-data.ts
          git commit -m "pricing: weekly update (${{ steps.diff.outputs.models }} models)"
          git push origin "$BRANCH"
          gh pr create \
            --title "pricing: weekly update (${{ steps.diff.outputs.models }} models)" \
            --body "Auto-generated by fetch-pricing.mjs from genai-prices + LiteLLM." \
            --label "automated"
