name: Update Pricing

on:
  schedule:
    - cron: '0 6 * * *'  # daily 6am UTC
  workflow_dispatch:


permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: fetch latest pricing
        run: node scripts/fetch-pricing.mjs

      - name: build and verify
        run: |
          pnpm turbo build --filter=@f3d1/llmkit-shared --filter=@f3d1/llmkit-mcp-server
          node scripts/generate-pricing.mjs --check
          node test/contract-test.mjs
          node packages/proxy/test/xai-cost-test.mjs
          node packages/proxy/test/unit-test.mjs
          node packages/shared/test/exports-test.mjs

      - name: check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            MODELS=$(node -e "const p=require('./packages/shared/pricing.json');console.log(Object.values(p.providers).reduce((s,m)=>s+Object.keys(m).length,0))")
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "models=$MODELS" >> $GITHUB_OUTPUT
          fi

      - name: create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="pricing-update-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add packages/shared/pricing.json packages/shared/src/pricing-data.ts packages/python-sdk/src/llmkit/_pricing_data.py packages/mcp-server/src/pricing-data.ts
          git commit -m "pricing: daily update (${{ steps.diff.outputs.models }} models)"
          git push origin "$BRANCH"
          gh pr create \
            --title "pricing: daily update (${{ steps.diff.outputs.models }} models)" \
            --body "Auto-generated daily by fetch-pricing.mjs from genai-prices + LiteLLM." \
            --label "automated"

      - name: alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="$TG_CHAT" \
            --data-urlencode "text=Pricing update workflow FAILED" > /dev/null
