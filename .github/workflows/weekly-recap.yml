name: Weekly Recap

on:
  schedule:
    - cron: '0 7 * * 1' # Monday 7am UTC = 8am CET
  workflow_dispatch:

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - name: gather weekly stats
        id: stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="smigolsmigol/llmkit"
          WEEK_AGO=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)

          # repo totals
          REPO_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO")
          STARS=$(echo "$REPO_DATA" | jq '.stargazers_count')
          FORKS=$(echo "$REPO_DATA" | jq '.forks_count')

          # new stars this week
          NEW_STARS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/stargazers?per_page=100" \
            -H "Accept: application/vnd.github.star+json" | \
            jq --arg since "$WEEK_AGO" '[.[] | select(.starred_at > $since)] | length')
          NEW_STARS=${NEW_STARS:-0}

          # issues opened/closed this week
          OPENED=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/issues?state=all&since=$WEEK_AGO&per_page=100" | \
            jq --arg since "$WEEK_AGO" '[.[] | select(.pull_request == null and .created_at > $since)] | length')
          CLOSED=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/issues?state=closed&since=$WEEK_AGO&per_page=100" | \
            jq --arg since "$WEEK_AGO" '[.[] | select(.pull_request == null and .closed_at > $since)] | length')

          # PRs merged this week
          MERGED=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls?state=closed&sort=updated&direction=desc&per_page=50" | \
            jq --arg since "$WEEK_AGO" '[.[] | select(.merged_at != null and .merged_at > $since)] | length')

          # commits this week
          COMMITS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/commits?since=$WEEK_AGO&per_page=100" | jq 'length')

          # npm weekly downloads
          DL_SHARED=$(curl -s "https://api.npmjs.org/downloads/point/last-week/@f3d1/llmkit-shared" | jq '.downloads // 0')
          DL_SDK=$(curl -s "https://api.npmjs.org/downloads/point/last-week/@f3d1/llmkit-sdk" | jq '.downloads // 0')
          DL_CLI=$(curl -s "https://api.npmjs.org/downloads/point/last-week/@f3d1/llmkit-cli" | jq '.downloads // 0')
          DL_AI=$(curl -s "https://api.npmjs.org/downloads/point/last-week/@f3d1/llmkit-ai-sdk-provider" | jq '.downloads // 0')
          DL_MCP=$(curl -s "https://api.npmjs.org/downloads/point/last-week/@f3d1/llmkit-mcp-server" | jq '.downloads // 0')
          TOTAL_DL=$((DL_SHARED + DL_SDK + DL_CLI + DL_AI + DL_MCP))

          echo "stars=$STARS" >> "$GITHUB_OUTPUT"
          echo "new_stars=$NEW_STARS" >> "$GITHUB_OUTPUT"
          echo "forks=$FORKS" >> "$GITHUB_OUTPUT"
          echo "issues_opened=$OPENED" >> "$GITHUB_OUTPUT"
          echo "issues_closed=$CLOSED" >> "$GITHUB_OUTPUT"
          echo "prs_merged=$MERGED" >> "$GITHUB_OUTPUT"
          echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"
          echo "npm_downloads=$TOTAL_DL" >> "$GITHUB_OUTPUT"

      - name: send recap
        run: |
          WEEK=$(date -u +%Y-W%V)
          TEXT=$(cat <<MSGEOF
          <b>Weekly Recap</b> $WEEK

          Stars: ${{ steps.stats.outputs.stars }} (+${{ steps.stats.outputs.new_stars }})
          Forks: ${{ steps.stats.outputs.forks }}
          Issues: ${{ steps.stats.outputs.issues_opened }} opened / ${{ steps.stats.outputs.issues_closed }} closed
          PRs merged: ${{ steps.stats.outputs.prs_merged }}
          Commits: ${{ steps.stats.outputs.commits }}
          npm downloads: ${{ steps.stats.outputs.npm_downloads }}
          MSGEOF
          )

          TEXT=$(echo "$TEXT" | sed ':a;N;$!ba;s/\n/%0A/g')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="$TEXT"
