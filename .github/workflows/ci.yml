name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: block private info leaks
        run: |
          PATTERNS="${{ secrets.PRIVATE_PATTERNS }}"
          [ -z "$PATTERNS" ] && echo "PRIVATE_PATTERNS secret not set, skipping" && exit 0
          FOUND=0
          for pat in $(echo "$PATTERNS" | tr ',' ' '); do
            if git grep -rli "$pat" -- ':!.github/workflows/' ':!.github/hooks/' 2>/dev/null; then
              echo "::error::Private pattern '$pat' found in tracked files"
              FOUND=1
            fi
          done
          [ "$FOUND" -ne 0 ] && exit 1 || exit 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: security audit + secrets scan
        run: semgrep scan --config p/security-audit --config p/secrets --error

  check-ts:
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: audit dependencies
        run: pnpm audit --audit-level=high

      - name: typecheck
        run: pnpm typecheck

      - name: biome
        run: npx biome check packages/proxy/src packages/sdk/src packages/cli/src packages/shared/src packages/ai-sdk-provider/src packages/mcp-server/src

      - name: knip
        run: npx knip --exclude types,exports

      - name: build publishable packages
        run: pnpm turbo build --filter=@f3d1/llmkit-shared --filter=@f3d1/llmkit-sdk --filter=@f3d1/llmkit-cli --filter=@f3d1/llmkit-ai-sdk-provider --filter=@f3d1/llmkit-mcp-server

      - name: publint
        run: |
          npx publint packages/shared
          npx publint packages/sdk
          npx publint packages/cli
          npx publint packages/ai-sdk-provider
          npx publint packages/mcp-server

      - name: test
        run: |
          node packages/proxy/test/unit-test.mjs
          node packages/proxy/test/crypto-test.mjs
          node packages/proxy/test/budget-test.mjs
          node packages/proxy/test/reservation-test.mjs
          node packages/proxy/test/budget-bypass-test.mjs
          node packages/cli/test/parser-test.mjs
          node packages/sdk/test/tracker-test.mjs

  check-python:
    needs: secrets-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: install
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest ruff mypy bandit pip-audit

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format
        run: ruff format --check src/ tests/

      - name: mypy
        run: mypy src/llmkit/

      - name: bandit
        run: bandit -r src/

      - name: pip-audit
        run: pip-audit

      - name: pytest
        run: python -m pytest tests/ -v

  deploy:
    needs: [secrets-scan, semgrep, check-ts, check-python]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: build shared
        run: pnpm --filter @f3d1/llmkit-shared run build

      - name: deploy proxy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/proxy

      - name: notify deploy
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>Deployed to CF Workers</b>%0A%0A<code>${{ github.event.head_commit.message }}</code>%0Aby ${{ github.actor }}"

  post-deploy-verify:
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: wait for deploys to settle
        run: sleep 30

      - name: verify proxy health
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "https://llmkit-proxy.smigolsmigol.workers.dev/health")
          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Proxy health check failed: got $STATUS"
            exit 1
          fi
          echo "Proxy: OK ($STATUS)"

      - name: verify dashboard reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "https://dashboard-two-zeta-54.vercel.app/sign-in")
          if [ "$STATUS" -eq 404 ] || [ "$STATUS" -eq 500 ] || [ "$STATUS" -eq 000 ]; then
            echo "::error::Dashboard check failed: got $STATUS"
            exit 1
          fi
          echo "Dashboard: OK ($STATUS)"

      - name: verify npm packages resolve
        run: |
          for pkg in "@f3d1/llmkit-sdk" "@f3d1/llmkit-cli" "@f3d1/llmkit-mcp-server" "@f3d1/llmkit-ai-sdk-provider" "@f3d1/llmkit-shared"; do
            VER=$(npm view "$pkg" version 2>&1)
            if [ $? -ne 0 ] || [ -z "$VER" ]; then
              echo "::error::npm package $pkg not found on registry"
              exit 1
            fi
            echo "$pkg: $VER"
          done

      - name: verify pypi package
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://pypi.org/pypi/llmkit-sdk/json")
          if [ "$STATUS" -ne 200 ]; then
            echo "::error::PyPI llmkit-sdk not found: got $STATUS"
            exit 1
          fi
          echo "PyPI llmkit-sdk: OK"

      - name: alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>Post-deploy verification FAILED</b>%0A%0ASomething is broken in production. Check the run:%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View logs</a>"

  notify-failure:
    needs: [secrets-scan, semgrep, check-ts, check-python, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: notify failure
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>CI failed</b>%0A%0A<code>${{ github.event.head_commit.message }}</code>%0Aby ${{ github.actor }}%0A%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View logs</a>"
