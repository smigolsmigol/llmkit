    <path d="M38 78 L62 78" stroke="#c084fc" stroke-width="5.5" stroke-linecap="square"/>
    <circle cx="31" cy="86" r="2.5" fill="#22d3ee"/>
    <!-- M -->
    <path d="M72 82 L72 15 L92 48 L112 15 L112 82" stroke="#c084fc" stroke-width="5.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
