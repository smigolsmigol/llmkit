name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@f3d1/llmkit-sdk"
        - "@f3d1/llmkit-cli"
        - "@f3d1/llmkit-ai-sdk-provider"
        - "@f3d1/llmkit-mcp-server"
        - "Proxy (self-hosted)"
        - "Dashboard"
        - "Other"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Node version, OS, package version"
