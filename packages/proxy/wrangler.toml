name = "llmkit-proxy"
main = "src/index.ts"
compatibility_date = "2025-02-18"
routes = [
  { pattern = "api.llmkit.sh/*", zone_name = "llmkit.sh" }
]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "BUDGET_DO"
class_name = "BudgetDO"

[[durable_objects.bindings]]
name = "RATE_LIMIT_DO"
class_name = "RateLimitDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BudgetDO", "RateLimitDO"]
