[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llmkit-sdk"
version = "0.1.4"
description = "AI API gateway SDK with cost tracking, budget enforcement, and multi-provider routing for LLM applications"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "f3d1" }]
requires-python = ">=3.9"
dependencies = ["openai>=1.0", "httpx>=0.24"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP",
    "Typing :: Typed",
]
keywords = [
    "llm",
    "ai",
    "api-gateway",
    "cost-tracking",
    "budget",
    "openai",
    "anthropic",
    "gemini",
    "claude",
    "token-usage",
    "observability",
    "proxy",
    "sdk",
    "ai-agents",
    "langchain",
]

[project.urls]
Homepage = "https://github.com/smigolsmigol/llmkit"
Documentation = "https://github.com/smigolsmigol/llmkit"
Repository = "https://github.com/smigolsmigol/llmkit"
Issues = "https://github.com/smigolsmigol/llmkit/issues"
Changelog = "https://github.com/smigolsmigol/llmkit/releases"

[tool.hatch.build.targets.wheel]
packages = ["src/llmkit"]
